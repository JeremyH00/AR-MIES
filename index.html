<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIES-AR • QR Scanner Final</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Librerías Externas (CDNs) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { black: '#000', white: '#fff', gray: { 800: '#1f1f1f', 900: '#111' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Capas de AR */
        #ar-container { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background: #000; }
        #video-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* Indicador visual del QR detectado */
        #marker-highlight {
            position: absolute; border: 4px solid #00ff00; box-shadow: 0 0 15px #00ff00; display: none; z-index: 30;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        /* Estilos de Galería */
        .model-card { transition: all 0.3s ease; border: 1px solid #333; }
        .model-card:hover { transform: translateY(-5px); border-color: #fff; }
        .qr-container { background: white; padding: 10px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: GALERÍA DE MODELOS -->
    <main id="gallery-view" class="min-h-screen p-4 md:p-8 pb-24">
        <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">MIES-AR</h1>
                <p class="text-gray-500">Escanea los códigos para ver los modelos en Realidad Aumentada.</p>
            </div>
            <button onclick="startAR()" class="bg-white text-black font-bold px-8 py-3 rounded-full flex items-center gap-2 hover:bg-gray-200 transition shadow-lg active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Escanear Códigos QR
            </button>
        </header>

        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="gallery-grid">
            <!-- Las tarjetas se generarán con JS aquí -->
        </div>
    </main>

    <!-- PANTALLA 2: VISOR AR -->
    <div id="ar-container">
        <video id="video-feed" playsinline muted></video>
        <canvas id="three-canvas"></canvas>
        <div id="marker-highlight"></div>

        <!-- UI Overlay del AR -->
        <div class="absolute top-0 left-0 w-full p-4 z-40 flex justify-between items-start pointer-events-none">
            <button onclick="stopAR()" class="pointer-events-auto bg-red-600/90 backdrop-blur text-white px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 shadow-lg active:scale-95 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                Salir
            </button>
            
            <div class="bg-black/70 backdrop-blur px-4 py-2 rounded-lg text-xs font-mono text-green-400 border border-green-500/30 max-w-[150px]">
                <div id="ar-status">Iniciando...</div>
            </div>
        </div>
        
        <!-- Indicador de escaneo visual -->
        <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/80 to-transparent z-20 flex items-center justify-center pointer-events-none">
            <div class="w-64 h-1 bg-white/20 rounded-full overflow-hidden">
                <div class="h-full bg-white w-1/3 animate-ping"></div>
            </div>
        </div>

        <!-- Toast de modelo detectado -->
        <div id="model-found-toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-white text-black px-6 py-3 rounded-xl shadow-2xl z-50 text-center transition-all duration-300 opacity-0 translate-y-4 pointer-events-none">
            <div class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-1">Modelo Detectado</div>
            <div id="detected-model-name" class="text-lg font-bold">---</div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- 1. CONFIGURACIÓN DE MODELOS ---
        const modelsData = [
            { id: 'skull-001', name: 'Cráneo 3D', url: 'https://threejs.org/examples/models/gltf/Skull.glb', color: 0xffffff },
            { id: 'damaged-helmet', name: 'Casco Dañado', url: 'https://threejs.org/examples/models/gltf/DamagedHelmet.glb', color: 0xff0000 },
            { id: 'robot-001', name: 'Robot Expressive', url: 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb', color: 0x00ff00 }
        ];

        // --- 2. RENDERIZADO DE GALERÍA Y GENERACIÓN QR ---
        const galleryGrid = document.getElementById('gallery-grid');

        modelsData.forEach(model => {
            const qrContainerId = `qr-${model.id}`;
            
            const cardHTML = `
                <div class="bg-gray-900 rounded-xl overflow-hidden model-card flex flex-col h-full shadow-xl">
                    <div class="bg-gray-800 aspect-video flex items-center justify-center relative group overflow-hidden">
                        <!-- Fondo decorativo -->
                        <div class="absolute inset-0 opacity-20 bg-gradient-to-tr from-gray-700 to-black"></div>
                        <!-- Icono 3D placeholder -->
                        <svg class="w-20 h-20 text-gray-600 group-hover:text-white transition-colors z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    </div>
                    <div class="p-6 flex flex-col flex-grow relative">
                        <h3 class="text-2xl font-bold mb-1 text-white">${model.name}</h3>
                        <p class="text-xs text-gray-500 font-mono mb-6 bg-white/5 inline-block px-2 py-1 rounded w-max">ID: ${model.id}</p>
                        
                        <div class="flex-grow flex items-center justify-center bg-white/5 rounded-lg border border-white/10 mb-4">
                            <div id="${qrContainerId}" class="qr-container"></div>
                        </div>
                        
                        <p class="text-center text-xs text-gray-400">Escanea este código con el botón de arriba para verlo en tu entorno.</p>
                    </div>
                </div>
            `;
            galleryGrid.insertAdjacentHTML('beforeend', cardHTML);

            // GENERACIÓN QR: CORREGIDO A NIVEL 'L' (Low) PARA MAYOR DETECCIÓN
            // Esto crea puntos más grandes y menos densos, ideales para escanear pantallas.
            new QRCode(document.getElementById(qrContainerId), {
                text: `model=${model.id}`,
                width: 160, // Un poco más grande
                height: 160,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L  // CAMBIO CLAVE: De 'H' a 'L'
            });
        });

        // --- 3. SISTEMA AR THREE.JS ---
        let video, canvas, ctx, scene, camera, renderer, currentModel = null;
        let animationId;
        let isARRunning = false;

        async function startAR() {
            document.getElementById('gallery-view').style.display = 'none';
            document.getElementById('ar-container').style.display = 'block';
            isARRunning = true;
            updateStatus("Iniciando cámara...");

            video = document.createElement('video');
            video.playsInline = true;
            video.muted = true;
            
            try {
                // SOLICITAR CÁMARA CON MEJOR RESOLUCIÓN
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 }, // Preferencia HD
                        height: { ideal: 1080 }
                    }
                });
                
                video.srcObject = stream;
                video.setAttribute("playsinline", true); 
                
                video.onloadedmetadata = function() {
                    video.play();
                    updateStatus("Buscando código QR...");
                    requestAnimationFrame(tick);
                };
                
            } catch (err) {
                console.error("Error cámara:", err);
                alert("Error: No se pudo acceder a la cámara. Asegúrate de usar HTTPS.");
                stopAR();
                return;
            }

            initThreeJS();
        }

        function stopAR() {
            isARRunning = false;
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('ar-container').style.display = 'none';
            document.getElementById('gallery-view').style.display = 'block';
            cancelAnimationFrame(animationId);
            
            // Limpiar escena 3D
            if(scene) {
                while(scene.children.length > 0){ 
                    scene.remove(scene.children[0]); 
                }
            }
            currentModel = null;
        }

        function initThreeJS() {
            const container = document.getElementById('ar-container');
            const w = container.clientWidth;
            const h = container.clientHeight;

            scene = new THREE.Scene();
            
            // Cámara de Three.js
            camera = new THREE.PerspectiveCamera(70, w / h, 0.01, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('three-canvas').appendChild(renderer.domElement);

            // Iluminación
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(2, 2, 2);
            scene.add(dirLight);
        }

        // --- 4. LÓGICA DE DETECCIÓN Y TRACKING ---
        function tick() {
            if (!isARRunning) return;
            animationId = requestAnimationFrame(tick);

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Crear canvas temporal para analizar frames (optimización: no crear uno nuevo cada frame)
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    ctx = canvas.getContext('2d', { willReadFrequently: true });
                }
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // jsQR: Análisis de imagen
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                const statusDiv = document.getElementById('ar-status');
                const markerHighlight = document.getElementById('marker-highlight');

                if (code) {
                    // QR ENCONTRADO
                    statusDiv.textContent = "¡QR Detectado!";
                    statusDiv.classList.replace('text-green-400', 'text-blue-400');
                    
                    // Dibujar recuadro verde
                    drawBoundingBox(code.location);
                    
                    // Procesar contenido
                    const rawData = code.data.trim();
                    
                    // Lógica simple de extracción de ID
                    let modelId = null;
                    if (rawData.startsWith('model=')) {
                        modelId = rawData.split('=')[1];
                    } else {
                        // Intentar coincidencia directa si no es "model=..."
                        const found = modelsData.find(m => m.id === rawData);
                        if(found) modelId = rawData;
                    }

                    if (modelId) {
                        loadOrPlaceModel(modelId);
                        const modelName = modelsData.find(m => m.id === modelId)?.name;
                        if (modelName) showModelToast(modelName);
                    }

                } else {
                    // SIN QR
                    statusDiv.textContent = "Buscando código QR...";
                    statusDiv.classList.replace('text-blue-400', 'text-green-400');
                    markerHighlight.style.display = 'none';
                }

                renderer.render(scene, camera);
            }
        }

        // Dibuja el recuadro sobre el QR detectado
        function drawBoundingBox(location) {
            const marker = document.getElementById('marker-highlight');
            marker.style.display = 'block';
            
            // Calcular centro aproximado y ancho
            const topLeft = location.topLeftCorner;
            const topRight = location.topRightCorner;
            const bottomLeft = location.bottomLeftCorner;
            
            const width = Math.sqrt(Math.pow(topRight.x - topLeft.x, 2) + Math.pow(topRight.y - topLeft.y, 2));
            
            const x = (topLeft.x + bottomRightCornerX(location)) / 2; // Centro X
            const y = (topLeft.y + bottomRightCornerY(location)) / 2; // Centro Y
            
            // Mapeo a pantalla
            const screenX = (x / video.videoWidth) * window.innerWidth;
            const screenY = (y / video.videoHeight) * window.innerHeight;
            const screenW = (width / video.videoWidth) * window.innerWidth;

            marker.style.left = `${screenX}px`;
            marker.style.top = `${screenY}px`;
            marker.style.width = `${screenW}px`;
            marker.style.height = `${screenW}px`; // Cuadrado
        }

        // Helpers para calcular centro inferior derecho
        function bottomRightCornerX(loc) { return (loc.topRightCorner.x + loc.bottomRightCorner.x)/2; }
        function bottomRightCornerY(loc) { return (loc.topRightCorner.y + loc.bottomRightCorner.y)/2; }


        // --- 5. GESTIÓN DEL MODELO 3D ---
        function loadOrPlaceModel(modelId) {
            // Si ya tenemos el modelo cargado y es el mismo, rotarlo
            if (currentModel && currentModel.userData.id === modelId) {
                const time = Date.now() * 0.001;
                currentModel.rotation.y = time + 1; // Rotación continua
                currentModel.position.set(0, 0, -2.5); // Posición fija frontal (tracking visual básico)
                return;
            }

            // Cargar nuevo modelo
            const modelData = modelsData.find(m => m.id === modelId);
            if (!modelData) return;

            // Remover anterior
            if (currentModel) {
                scene.remove(currentModel);
            }

            const loader = new THREE.GLTFLoader();
            loader.load(modelData.url, (gltf) => {
                currentModel = gltf.scene;
                currentModel.userData.id = modelId;
                
                // Ajuste de escala y posición inicial
                currentModel.scale.set(0.8, 0.8, 0.8); 
                currentModel.position.set(0, 0, -2.5); 
                
                scene.add(currentModel);
                console.log("Modelo cargado:", modelData.name);

            }, undefined, (error) => {
                console.error('Error cargando modelo:', error);
                updateStatus("Error cargando modelo");
            });
        }

        function updateStatus(msg) {
            document.getElementById('ar-status').textContent = msg;
        }

        function showModelToast(name) {
            const toast = document.getElementById('model-found-toast');
            const nameEl = document.getElementById('detected-model-name');
            nameEl.textContent = name;
            toast.classList.remove('opacity-0', 'translate-y-4');
            
            // Ocultar después de 3 segundos si no hay nuevo QR
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        // Ajuste al rotar pantalla
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

    </script>
</body>
</html>

    </script>
</body>
</html>
